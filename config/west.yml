manifest:
  remotes:
    - name: serene-industries
      url-base: https://github.com/serene-industries
  projects:
    # Patched ZMK core (RGB persistence, custom Studio subsystems, the board's
    # app-level sources). Imports zephyr + modules + the custom
    # zmk-studio-messages (lighting/ble/stats protos) via the fork's app/west.yml.
    - name: zmk
      remote: serene-industries
      revision: icebreaker-studio
      import: app/west.yml
  self:
    path: config
