name: Firmware (Wireless)

# Cloud build for the Icebreaker Wireless (ZMK) firmware.
#   - Edit board/keymap under config/boards/arm/icebreaker/ and push to main
#     -> CI compiles and uploads icebreaker_wireless.uf2 as an artifact.
#   - Bump the icebreaker-wireless line in VERSION on main
#     -> CI compiles AND publishes a GitHub Release tagged from that version
#        (icebreaker-wireless-v<VERSION>), if it doesn't already exist. This is
#        the normal way to ship: no tag push needed, just bump VERSION on main.
#   - Pushing a tag icebreaker-wireless-vX.Y.Z still works too (compiles AND
#     publishes that exact tag).
#        The si-configurator reads these releases by tag prefix, so a published
#        build is live in the configurator within minutes. No local machine.

on:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'build.yaml'
      - 'VERSION'
      - '.github/workflows/firmware.yml'
    tags:
      - 'icebreaker-wireless-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag from VERSION
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/icebreaker-wireless-v* ]]; then
            # Tag push: release exactly that tag.
            TAG="${GITHUB_REF#refs/tags/}"
            DO=true
          else
            # Branch push / manual run: derive the tag from VERSION and only
            # publish if that release doesn't already exist (idempotent — a
            # plain config change re-builds the artifact but won't re-release).
            VER="$(grep -E '^[[:space:]]*icebreaker-wireless[[:space:]]' VERSION | awk '{print $2}')"
            TAG="icebreaker-wireless-v${VER}"
            API="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
            if command -v curl >/dev/null 2>&1; then
              CODE="$(curl -s -o /dev/null -w '%{http_code}' \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" "${API}")"
            elif command -v wget >/dev/null 2>&1; then
              CODE="$(wget -q -S -O /dev/null \
                --header="Authorization: Bearer ${GH_TOKEN}" \
                --header="Accept: application/vnd.github+json" "${API}" 2>&1 \
                | awk '/HTTP\//{c=$2} END{print c+0}')"
            else
              CODE="000"
            fi
            # Only an explicit 200 (release already exists) skips publishing;
            # 404 or any transient/non-200 falls through to publish (re-publish
            # is idempotent — action-gh-release updates the existing release).
            if [[ "${CODE}" == "200" ]]; then DO=false; else DO=true; fi
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "do_release=${DO}" >> "${GITHUB_OUTPUT}"
          echo "Resolved tag=${TAG} do_release=${DO} (ref=${GITHUB_REF})"

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: zmk-${{ hashFiles('config/west.yml') }}
          restore-keys: zmk-

      - name: West init
        run: west init -l config

      - name: West update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build wireless firmware
        # Board, keymap, subsystems and core all live in the fork (pulled by
        # config/west.yml), so this builds the board straight from zmk/app.
        run: west build -s zmk/app -d build -b icebreaker -S studio-rpc-usb-uart

      - name: Stage artifact
        run: cp build/zephyr/zmk.uf2 icebreaker_wireless.uf2

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: icebreaker_wireless
          path: icebreaker_wireless.uf2

      - name: Publish release
        # Fires on a version tag, or on a main/VERSION bump whose release does
        # not yet exist. On a branch push, action-gh-release creates the tag at
        # the built commit. Tags created here use GITHUB_TOKEN, so they do not
        # re-trigger this workflow (no release loop).
        if: steps.rel.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: Icebreaker Wireless ${{ steps.rel.outputs.tag }}
          files: icebreaker_wireless.uf2
          generate_release_notes: true
