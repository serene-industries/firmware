name: Firmware (Wired QMK)

# Cloud build for the wired QMK boards (Cleaver HE, Icebreaker HE, Icebreaker
# Hotswap). Edits to boards/wired/** are overlaid onto Matthijs's QMK fork
# (SmollChungus/qmk_firmware @ dev_cleaver) and compiled in GitHub Actions.
#   - Push to main (boards/wired/**) -> build all, upload artifacts.
#   - Push a tag (cleaver-he-vX / icebreaker-he-vX / icebreaker-hs-vX)
#     -> build + publish a Release with the matching binary.

on:
  push:
    branches: [main]
    paths:
      - 'boards/wired/**'
      - '.github/workflows/firmware-wired.yml'
    tags:
      - 'cleaver-he-v*'
      - 'icebreaker-he-v*'
      - 'icebreaker-hs-v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Version tag to publish (e.g. cleaver-he-v0.4.2.5). Leave blank to build artifacts only.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - kb: cleaver/hall_effect
            km: via
            ext: bin
            tagprefix: cleaver-he-v
            out: cleaver_hall_effect_via
          - kb: cleaver/hall_effect
            km: mac
            ext: bin
            tagprefix: cleaver-he-v
            out: cleaver_hall_effect_mac
          - kb: icebreaker/hall_effect
            km: via
            ext: bin
            tagprefix: icebreaker-he-v
            out: icebreaker_hall_effect_via
          - kb: icebreaker/hotswap
            km: default
            ext: uf2
            tagprefix: icebreaker-hs-v
            out: icebreaker_hotswap
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4
        with:
          path: hub

      - name: Clone QMK fork (Matthijs / SmollChungus, dev_cleaver)
        run: git clone --depth 1 -b dev_cleaver https://github.com/SmollChungus/qmk_firmware qmk

      - name: Python deps (fork's QMK predates the container's deps)
        run: |
          python3 -m pip install --break-system-packages -r qmk/requirements.txt 2>/dev/null \
            || python3 -m pip install --break-system-packages appdirs \
            || python3 -m pip install appdirs
          git config --global --add safe.directory '*'

      - name: Patch fork QMK python for Python 3.12+ (ast.Num removed)
        working-directory: qmk
        run: |
          # The container's qmk CLI runs on Python 3.12+, where ast.Num/ast.Str
          # were removed. Matthijs's older fork still uses them in math.py.
          if [ -f lib/python/qmk/math.py ]; then
            sed -i -E 's/ast\.Num/ast.Constant/g; s/\bnode\.n\b/node.value/g' lib/python/qmk/math.py
          fi

      - name: Init QMK submodules
        working-directory: qmk
        run: qmk git-submodule || make git-submodule

      - name: Overlay hub board sources
        run: |
          cp -r hub/boards/wired/cleaver/.               qmk/keyboards/cleaver/
          cp -r hub/boards/wired/icebreaker_hall_effect/. qmk/keyboards/icebreaker/
          cp -r hub/boards/wired/icebreaker_hotswap/.     qmk/keyboards/icebreaker/hotswap/

      - name: Compile ${{ matrix.kb }}:${{ matrix.km }}
        working-directory: qmk
        run: qmk compile -kb ${{ matrix.kb }} -km ${{ matrix.km }}

      - name: Stage artifact
        run: |
          mkdir -p out
          # qmk writes <kb_with_underscores>_<km>.<ext> into qmk/.build or repo root
          f=$(ls qmk/*.${{ matrix.ext }} qmk/.build/*.${{ matrix.ext }} 2>/dev/null | head -1)
          echo "found: $f"
          cp "$f" "out/${{ matrix.out }}.${{ matrix.ext }}"
          ls -la out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: out/${{ matrix.out }}.${{ matrix.ext }}

      # Publishes when a matching version tag is pushed, OR when run via
      # workflow_dispatch with `publish` set to a matching tag (tag pushes are
      # blocked in some environments; this lets the release be cut by dispatch).
      # action-gh-release creates the tag at the checked-out commit if missing.
      - name: Publish release
        if: >
          startsWith(github.ref, format('refs/tags/{0}', matrix.tagprefix)) ||
          (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.publish, matrix.tagprefix))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.publish }}
          files: out/${{ matrix.out }}.${{ matrix.ext }}
          generate_release_notes: true
